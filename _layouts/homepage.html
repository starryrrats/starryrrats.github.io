---
layout: default
---

<h1>{{ site.title }}</h1>

{{ content }}

<h2>Recent Posts</h2>

<ul>
{% for post in site.posts limit:5 %}
  <li>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <small>{{ post.date | date: "%b %-d, %Y" }}</small>
  </li>
{% endfor %}
</ul>

{% if site.posts.size > 5 %}
<p>
  <a href="{{ '/archive.html' | relative_url }}">See all posts →</a>
</p>
{% endif %}
